name: Deploy to Server

on:
  push:
    branches: [ main ] # Ganti dengan branch utama Anda (main/master)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        port: 22 # Ganti jika port SSH Anda berbeda
        script: |
          cd /var/www/html/superapp # Ganti dengan path folder project di server Anda
          git pull origin main
          composer install --no-dev --optimize-autoloader
          php spark migrate
          php spark cache:clear
